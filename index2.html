<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serein By Sen - Business Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jsPDF & AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair+Display', serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f5f5f4; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }

        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'serein-by-sen';

        const { useState, useEffect, useMemo } = React;

        // Business Logo
        const LOGO_URL = "https://api.dicebear.com/7.x/initials/svg?seed=Serein&backgroundColor=f5f5f4&textColor=1c1917";

        function App() {
            const [user, setUser] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [password, setPassword] = useState('');
            const [rememberMe, setRememberMe] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [message, setMessage] = useState(null);

            // Data State
            const [orders, setOrders] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalType, setModalType] = useState('order');

            // Date Range for Reports
            const [dateRange, setDateRange] = useState({
                start: new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0],
                end: new Date().toISOString().split('T')[0]
            });

            // Forms
            const [orderForm, setOrderForm] = useState({ customer: '', amount: '', cost: '', status: 'Pending', category: 'Saree', imageUrl: '' });
            const [expenseForm, setExpenseForm] = useState({ description: '', amount: '', category: 'Material' });

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (!u) signInAnonymously(auth);
                    setLoading(false);
                });

                if (localStorage.getItem('serein_auth_status') === 'true') {
                    setIsAuthenticated(true);
                }
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !isAuthenticated) return;

                const unsubOrders = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setOrders(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });

                const unsubExpenses = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'expenses'), (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setExpenses(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });

                return () => { unsubOrders(); unsubExpenses(); };
            }, [user, isAuthenticated]);

            const showMessage = (text, type = 'success') => {
                setMessage({ text, type });
                setTimeout(() => setMessage(null), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === "Arpita Sen") {
                    setIsAuthenticated(true);
                    if (rememberMe) localStorage.setItem('serein_auth_status', 'true');
                    showMessage("Welcome back!");
                } else {
                    showMessage("Incorrect Passcode", "error");
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                localStorage.removeItem('serein_auth_status');
                showMessage("Logged out");
            };

            const addOrder = async (e) => {
                e.preventDefault();
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), {
                        ...orderForm,
                        amount: parseFloat(orderForm.amount) || 0,
                        cost: parseFloat(orderForm.cost) || 0,
                        date: new Date().toISOString().split('T')[0],
                        createdAt: serverTimestamp()
                    });
                    setOrderForm({ customer: '', amount: '', cost: '', status: 'Pending', category: 'Saree', imageUrl: '' });
                    setIsModalOpen(false);
                    showMessage("Order Saved");
                } catch (err) { showMessage("Save failed", "error"); }
            };

            const addExpense = async (e) => {
                e.preventDefault();
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'expenses'), {
                        ...expenseForm,
                        amount: parseFloat(expenseForm.amount) || 0,
                        date: new Date().toISOString().split('T')[0],
                        createdAt: serverTimestamp()
                    });
                    setExpenseForm({ description: '', amount: '', category: 'Material' });
                    setIsModalOpen(false);
                    showMessage("Expense Logged");
                } catch (err) { showMessage("Save failed", "error"); }
            };

            const stats = useMemo(() => {
                const sales = orders.filter(o => o.status === 'Paid').reduce((acc, c) => acc + (c.amount || 0), 0);
                const cost = orders.filter(o => o.status === 'Paid').reduce((acc, c) => acc + (c.cost || 0), 0);
                const exp = expenses.reduce((acc, c) => acc + (c.amount || 0), 0);
                return { sales, expenses: exp, profit: sales - cost - exp };
            }, [orders, expenses]);

            const generatePDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const filteredOrders = orders.filter(o => o.date >= dateRange.start && o.date <= dateRange.end);
                const filteredExpenses = expenses.filter(e => e.date >= dateRange.start && e.date <= dateRange.end);

                const rangeSales = filteredOrders.filter(o => o.status === 'Paid').reduce((acc, c) => acc + c.amount, 0);
                const rangeCost = filteredOrders.filter(o => o.status === 'Paid').reduce((acc, c) => acc + c.cost, 0);
                const rangeExp = filteredExpenses.reduce((acc, c) => acc + c.amount, 0);

                doc.setFontSize(22);
                doc.text("Serein By Sen - Business Report", 14, 20);
                doc.setFontSize(10);
                doc.text(`Duration: ${dateRange.start} to ${dateRange.end}`, 14, 30);
                
                doc.autoTable({
                    startY: 40,
                    head: [['Metric', 'Value']],
                    body: [
                        ['Total Sales (Paid)', `$${rangeSales.toFixed(2)}`],
                        ['Product Costs', `$${rangeCost.toFixed(2)}`],
                        ['Operating Expenses', `$${rangeExp.toFixed(2)}`],
                        ['Net Profit', `$${(rangeSales - rangeCost - rangeExp).toFixed(2)}`]
                    ],
                    theme: 'grid',
                    headStyles: { fillColor: [30, 30, 30] }
                });

                doc.text("Order List", 14, doc.lastAutoTable.finalY + 15);
                doc.autoTable({
                    startY: doc.lastAutoTable.finalY + 20,
                    head: [['Date', 'Category', 'Customer', 'Price', 'Status']],
                    body: filteredOrders.map(o => [o.date, o.category, o.customer, `$${o.amount}`, o.status])
                });

                doc.save(`Serein_Report_${dateRange.start}_to_${dateRange.end}.pdf`);
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-stone-50 text-stone-400">Loading Workspace...</div>;

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-stone-100 text-center animate-fade-in">
                            <img src={LOGO_URL} className="w-20 h-20 rounded-full mx-auto mb-6 shadow-sm border-2 border-stone-50" />
                            <h1 className="text-4xl font-serif text-stone-800 mb-2">Serein</h1>
                            <p className="text-xs uppercase tracking-widest text-stone-400 mb-8">By Sen Management</p>
                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                <div>
                                    <label className="text-[10px] font-bold text-stone-400 uppercase tracking-tighter">Passcode</label>
                                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full mt-1 p-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-stone-200 outline-none" placeholder="Enter password..." />
                                </div>
                                <div className="flex items-center">
                                    <input type="checkbox" id="rem" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} className="rounded text-stone-900 focus:ring-stone-800" />
                                    <label htmlFor="rem" className="ml-2 text-xs text-stone-500">Remember Me</label>
                                </div>
                                <button className="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-stone-800 transition-all">Login</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <aside className="w-full md:w-64 bg-white border-r border-stone-100 p-6 flex flex-col">
                        <div className="mb-10 text-center md:text-left">
                            <img src={LOGO_URL} className="w-12 h-12 rounded-xl mb-4 shadow-sm mx-auto md:mx-0" />
                            <h2 className="text-xl font-serif font-bold">Serein</h2>
                            <p className="text-[10px] text-stone-400 uppercase tracking-widest">Business Suite</p>
                        </div>
                        <nav className="space-y-2 flex-grow">
                            {['Dashboard', 'Orders', 'Expenses', 'Reports'].map(tab => (
                                <button 
                                    key={tab} 
                                    onClick={() => setActiveTab(tab.toLowerCase())}
                                    className={`w-full text-left px-4 py-3 rounded-xl font-medium transition-all ${activeTab === tab.toLowerCase() ? 'bg-stone-900 text-white shadow-md' : 'text-stone-400 hover:bg-stone-50'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </nav>
                        <button onClick={handleLogout} className="mt-auto py-3 text-rose-500 font-bold hover:bg-rose-50 rounded-xl">Logout</button>
                    </aside>

                    {/* Main */}
                    <main className="flex-grow p-6 md:p-10 max-h-screen overflow-y-auto">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h3 className="text-2xl font-semibold capitalize">{activeTab}</h3>
                                <p className="text-sm text-stone-400">Managing Serein operations</p>
                            </div>
                            {activeTab !== 'reports' && (
                                <button onClick={() => { setModalType(activeTab === 'expenses' ? 'expense' : 'order'); setIsModalOpen(true); }} className="bg-stone-900 text-white px-6 py-3 rounded-full font-bold shadow-lg flex items-center space-x-2">
                                    <span>+ Add New</span>
                                </button>
                            )}
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                                        <p className="text-[10px] text-stone-400 font-bold uppercase mb-1">Sales (Paid)</p>
                                        <p className="text-3xl font-bold text-emerald-600">${stats.sales.toLocaleString()}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                                        <p className="text-[10px] text-stone-400 font-bold uppercase mb-1">Expenses</p>
                                        <p className="text-3xl font-bold text-rose-500">${stats.expenses.toLocaleString()}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm bg-stone-900 text-white">
                                        <p className="text-[10px] text-stone-400 font-bold uppercase mb-1">Net Profit</p>
                                        <p className="text-3xl font-bold">${stats.profit.toLocaleString()}</p>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-6 rounded-3xl border border-stone-100">
                                        <h4 className="font-bold mb-4 text-sm">Recent Orders</h4>
                                        <div className="space-y-3">
                                            {orders.slice(0, 5).map(o => (
                                                <div key={o.id} className="flex items-center justify-between p-3 bg-stone-50 rounded-2xl">
                                                    <div className="flex items-center space-x-3">
                                                        <div className="w-10 h-10 bg-white rounded-lg overflow-hidden">
                                                            {o.imageUrl ? <img src={o.imageUrl} className="w-full h-full object-cover" /> : <div className="bg-stone-200 w-full h-full"></div>}
                                                        </div>
                                                        <div>
                                                            <p className="text-sm font-bold">{o.customer}</p>
                                                            <p className="text-[9px] text-stone-400 uppercase">{o.category}</p>
                                                        </div>
                                                    </div>
                                                    <p className="font-bold text-sm">${o.amount}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-stone-100">
                                        <h4 className="font-bold mb-4 text-sm">Recent Expenses</h4>
                                        <div className="space-y-3">
                                            {expenses.slice(0, 5).map(e => (
                                                <div key={e.id} className="flex justify-between p-3 bg-stone-50 rounded-2xl">
                                                    <div><p className="text-sm font-bold">{e.description}</p><p className="text-[9px] text-stone-400 uppercase">{e.category}</p></div>
                                                    <p className="text-rose-500 font-bold">-${e.amount}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'orders' && (
                            <div className="bg-white rounded-3xl border border-stone-100 overflow-hidden shadow-sm animate-fade-in">
                                <table className="w-full text-left">
                                    <thead className="bg-stone-50 text-[10px] uppercase font-bold text-stone-400"><tr className="px-6">
                                        <th className="px-6 py-4">Product</th><th className="px-6 py-4">Category</th><th className="px-6 py-4">Price</th><th className="px-6 py-4">Status</th>
                                    </tr></thead>
                                    <tbody className="divide-y divide-stone-100">
                                        {orders.map(o => (
                                            <tr key={o.id} className="text-sm hover:bg-stone-50">
                                                <td className="px-6 py-4 flex items-center space-x-3">
                                                    <div className="w-10 h-10 bg-stone-100 rounded-lg overflow-hidden border">
                                                        {o.imageUrl ? <img src={o.imageUrl} className="w-full h-full object-cover" /> : null}
                                                    </div>
                                                    <div><p className="text-[9px] text-stone-400">{o.date}</p><p className="font-bold">{o.customer}</p></div>
                                                </td>
                                                <td className="px-6 py-4 text-[10px] uppercase font-bold text-stone-500">{o.category}</td>
                                                <td className="px-6 py-4 font-bold">${o.amount}</td>
                                                <td className="px-6 py-4"><span className="text-[10px] px-2 py-1 rounded-full border bg-stone-50">{o.status}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'reports' && (
                            <div className="flex justify-center py-10 animate-fade-in">
                                <div className="bg-white p-10 rounded-3xl shadow-xl max-w-xl w-full border text-center">
                                    <h4 className="text-2xl font-serif mb-6">Business Performance Sheet</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left mb-8">
                                        <div><label className="text-[10px] font-bold text-stone-400 uppercase">Start Date</label><input type="date" value={dateRange.start} onChange={e => setDateRange({...dateRange, start: e.target.value})} className="w-full mt-1 p-4 bg-stone-50 rounded-2xl outline-none" /></div>
                                        <div><label className="text-[10px] font-bold text-stone-400 uppercase">End Date</label><input type="date" value={dateRange.end} onChange={e => setDateRange({...dateRange, end: e.target.value})} className="w-full mt-1 p-4 bg-stone-50 rounded-2xl outline-none" /></div>
                                    </div>
                                    <button onClick={generatePDF} className="w-full bg-stone-900 text-white py-5 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">Download Report</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Notification */}
                    {message && (
                        <div className={`fixed top-6 right-6 p-4 rounded-2xl shadow-2xl border text-sm font-bold animate-fade-in z-[200] ${message.type === 'error' ? 'bg-rose-50 text-rose-600 border-rose-100' : 'bg-stone-900 text-white border-stone-800'}`}>
                            {message.text}
                        </div>
                    )}

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-fade-in">
                                <div className="p-6 border-b flex justify-between items-center bg-stone-50">
                                    <h4 className="font-serif text-xl">New {modalType}</h4>
                                    <button onClick={() => setIsModalOpen(false)} className="font-bold">✕</button>
                                </div>
                                <div className="p-6">
                                    {modalType === 'order' ? (
                                        <form onSubmit={addOrder} className="space-y-4">
                                            <input placeholder="Image URL" className="w-full p-4 bg-stone-50 rounded-2xl" value={orderForm.imageUrl} onChange={e => setOrderForm({...orderForm, imageUrl: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <select className="w-full p-4 bg-stone-50 rounded-2xl" value={orderForm.category} onChange={e => setOrderForm({...orderForm, category: e.target.value})}><option>Saree</option><option>Kurti</option><option>Jewelry</option><option>Other</option></select>
                                                <select className="w-full p-4 bg-stone-50 rounded-2xl" value={orderForm.status} onChange={e => setOrderForm({...orderForm, status: e.target.value})}><option>Pending</option><option>Paid</option></select>
                                            </div>
                                            <input required placeholder="Customer Name" className="w-full p-4 bg-stone-50 rounded-2xl" value={orderForm.customer} onChange={e => setOrderForm({...orderForm, customer: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input required type="number" placeholder="Selling Price" className="w-full p-4 bg-stone-50 rounded-2xl" value={orderForm.amount} onChange={e => setOrderForm({...orderForm, amount: e.target.value})} />
                                                <input required type="number" placeholder="Product Cost" className="w-full p-4 bg-stone-50 rounded-2xl" value={orderForm.cost} onChange={e => setOrderForm({...orderForm, cost: e.target.value})} />
                                            </div>
                                            <button className="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold">Save Order</button>
                                        </form>
                                    ) : (
                                        <form onSubmit={addExpense} className="space-y-4">
                                            <input required placeholder="Description" className="w-full p-4 bg-stone-50 rounded-2xl" value={expenseForm.description} onChange={e => setExpenseForm({...expenseForm, description: e.target.value})} />
                                            <input required type="number" placeholder="Amount" className="w-full p-4 bg-stone-50 rounded-2xl" value={expenseForm.amount} onChange={e => setExpenseForm({...expenseForm, amount: e.target.value})} />
                                            <select className="w-full p-4 bg-stone-50 rounded-2xl" value={expenseForm.category} onChange={e => setExpenseForm({...expenseForm, category: e.target.value})}><option>Material</option><option>Marketing</option><option>Logistics</option></select>
                                            <button className="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold">Save Expense</button>
                                        </form>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
